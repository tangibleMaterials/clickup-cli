name: Release

# Adapted from upstream nicholasbester/clickup-cli's build.yml. Cross-compiles
# release binaries on tag push, publishes them as GitHub Release assets, and
# publishes the npm wrapper package (@tangiblematerials/clickup-cli), whose
# postinstall downloads the matching binary from the release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: clickup-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: clickup-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: clickup-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: clickup-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: clickup-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz clickup-cli clkup
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip clickup-cli.exe clkup.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/clickup-macos-arm64.tar.gz
            artifacts/clickup-macos-x86_64.tar.gz
            artifacts/clickup-linux-x86_64.tar.gz
            artifacts/clickup-linux-arm64.tar.gz
            artifacts/clickup-windows-x86_64.zip

      - name: Setup Node.js
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # Publish the npm wrapper. Its postinstall (install.js) downloads the
      # matching binary from the GitHub Release created above, so this step
      # runs after the release exists. Version is synced to the pushed tag.
      - name: Publish to npm
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          if npm view "@tangiblematerials/clickup-cli@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::npm: version ${VERSION} already exists, skipping"
          else
            npm publish --access public
          fi
