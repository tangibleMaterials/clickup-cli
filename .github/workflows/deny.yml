name: cargo-deny

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - deny.toml
      - .github/workflows/deny.yml
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - deny.toml
      - .github/workflows/deny.yml
  schedule:
    # Weekly full re-check against the Advisory DB even with no code changes.
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
