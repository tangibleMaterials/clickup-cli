name: Sync changelog to docs

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild docs/changelog.md
        run: |
          {
            echo '---'
            echo 'layout: default'
            echo 'title: Changelog'
            echo "description: Release notes for clickup-cli — every version's additions, changes, and fixes."
            echo 'permalink: /changelog/'
            echo '---'
            echo
            cat CHANGELOG.md
          } > docs/changelog.md

      - name: Commit if changed
        run: |
          if ! git diff --quiet docs/changelog.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/changelog.md
            git commit -m "docs: sync changelog to site"
            git push
          fi
