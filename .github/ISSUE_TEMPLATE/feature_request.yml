name: Feature request
description: Suggest a new feature, API endpoint, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What can't you do today, or what's awkward?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? A sketch of the CLI/MCP surface is helpful.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today, or what other designs did you weigh?

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      multiple: true
      options:
        - CLI commands
        - MCP server / tools
        - Output formatting
        - Packaging / install
        - Documentation
        - CI / release pipeline
